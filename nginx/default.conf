server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;

    # The cached FIDO MDS blob. Served with a permissive CORS header so it can be
    # fetched from browsers, and a modest cache lifetime since it changes rarely.
    location = /blob.jwt {
        default_type        application/jwt;
        add_header          Access-Control-Allow-Origin "*" always;
        add_header          Cache-Control "public, max-age=3600" always;
    }

    # The nextUpdate date of the currently-served blob (plain text, e.g. 2026-07-01).
    location = /next-update.txt {
        default_type        text/plain;
        add_header          Access-Control-Allow-Origin "*" always;
    }

    # Liveness/readiness probe.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Redirect the root to the blob for convenience (mirrors the upstream URL).
    location = / {
        return 302 /blob.jwt;
    }
}
